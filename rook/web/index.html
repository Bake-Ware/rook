<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>♖ ROOK</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0d1117; --surface: #161b22; --border: #30363d;
  --text: #c9d1d9; --text-dim: #8b949e; --accent: #58a6ff;
  --green: #3fb950; --red: #f85149; --yellow: #d29922;
  --font: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
}
body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 13px; height: 100vh; display: flex; flex-direction: column; }
a { color: var(--accent); text-decoration: none; }

/* Top bar */
.topbar { display: flex; align-items: center; gap: 16px; padding: 8px 16px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.topbar .logo { font-size: 18px; font-weight: bold; }
.topbar .stat { color: var(--text-dim); font-size: 11px; }
.topbar .stat b { color: var(--text); }
.topbar select { background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 4px 8px; border-radius: 4px; font-family: var(--font); font-size: 12px; }

/* Main layout */
.main { display: flex; flex: 1; overflow: hidden; }

/* Sidebar */
.sidebar { width: 260px; background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; flex-shrink: 0; padding: 12px; }
.sidebar h3 { color: var(--text-dim); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin: 16px 0 6px 0; }
.sidebar h3:first-child { margin-top: 0; }
.sidebar .item { padding: 4px 0; font-size: 12px; color: var(--text-dim); }
.sidebar .item b { color: var(--text); }
.sidebar .item.online::before { content: '●'; color: var(--green); margin-right: 6px; }
.sidebar .item.offline::before { content: '●'; color: var(--red); margin-right: 6px; }
.badge { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; }
.badge.v { background: #1a1a2e; color: var(--yellow); }
.badge.w { background: #1a2e1a; color: var(--green); }
.badge.c { background: #2e1a1a; color: var(--accent); }

/* Pipeline */
.pipeline { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; margin: 4px 0; }
.pipeline .stage { padding: 3px 8px; border-radius: 4px; font-size: 11px; border: 1px solid var(--border); }
.pipeline .stage.on { border-color: var(--green); color: var(--green); }
.pipeline .stage.off { border-color: var(--border); color: var(--text-dim); opacity: 0.5; }
.pipeline .arrow { color: var(--text-dim); }
.pipeline select { background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 2px 4px; border-radius: 3px; font-size: 10px; font-family: var(--font); }
.pipeline label { font-size: 10px; color: var(--text-dim); cursor: pointer; }
.pipeline input[type=checkbox] { margin-right: 2px; }

/* Chat area */
.chat { flex: 1; display: flex; flex-direction: column; }
.messages { flex: 1; overflow-y: auto; padding: 16px; }
.msg { margin-bottom: 12px; max-width: 85%; }
.msg.user { margin-left: auto; }
.msg .bubble { padding: 8px 12px; border-radius: 8px; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; }
.msg.user .bubble { background: #1f3a5f; color: var(--text); border-bottom-right-radius: 2px; }
.msg.rook .bubble { background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 2px; }
.msg.tool .bubble { background: transparent; color: var(--text-dim); font-size: 11px; padding: 2px 8px; border-left: 2px solid var(--border); }
.msg.tool .bubble.done { border-left-color: var(--green); }
.msg.error .bubble { background: #2d1418; color: var(--red); border: 1px solid #f8514933; }

/* Input */
.input-area { padding: 12px 16px; border-top: 1px solid var(--border); background: var(--surface); display: flex; gap: 8px; }
.input-area textarea { flex: 1; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; font-family: var(--font); font-size: 13px; resize: none; min-height: 40px; max-height: 120px; }
.input-area textarea:focus { outline: none; border-color: var(--accent); }
.input-area button { background: var(--accent); color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-family: var(--font); font-size: 13px; }
.input-area button:hover { opacity: 0.9; }

@media (max-width: 768px) {
  .sidebar { display: none; }
  .topbar .stat { display: none; }
}
</style>
</head>
<body>

<div class="topbar">
  <span class="logo">♖ ROOK</span>
  <span class="stat" id="sys-stats"></span>
  <span class="stat" id="quota-stats"></span>
  <span class="stat" id="pipeline-summary"></span>
</div>

<div class="main">
  <div class="sidebar">
    <h3>Pipeline</h3>
    <div id="pipeline-config"></div>

    <h3>Workers</h3>
    <div id="workers-list"><div class="item">loading...</div></div>

    <h3>Memory</h3>
    <div id="memory-stats">
      <div class="item" style="cursor:pointer" onclick="showFacts('volatile')"><span class="badge v">V</span> <span id="mem-v-count">...</span></div>
      <div class="item" style="cursor:pointer" onclick="showFacts('working')"><span class="badge w">W</span> <span id="mem-w-count">...</span></div>
      <div class="item" style="cursor:pointer" onclick="showFacts('concrete')"><span class="badge c">C</span> <span id="mem-c-count">...</span></div>
      <div id="facts-detail"></div>
    </div>

    <h3>Goals</h3>
    <div id="goals-list"><div class="item">none</div></div>

    <h3>Jobs</h3>
    <div id="jobs-list"><div class="item">none</div></div>

    <h3>Channels</h3>
    <div id="channels-list"></div>
  </div>

  <div class="chat">
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <textarea id="input" placeholder="Talk to Rook..." rows="1" onkeydown="handleKey(event)"></textarea>
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>

<script>
const wsUrl = `ws${location.protocol === 'https:' ? 's' : ''}://${location.host}/ws/ui`;
let ws = null;
let models = [];

function connectWS() {
  ws = new WebSocket(wsUrl);
  ws.onopen = () => addMsg('system', 'Connected to Rook');
  ws.onclose = () => { addMsg('system', 'Disconnected. Reconnecting...'); setTimeout(connectWS, 3000); };
  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.type === 'response') addMsg('rook', data.content);
    else if (data.type === 'tool_status') addToolStatus(data.content);
    else if (data.type === 'error') addMsg('error', data.content);
  };
}

function addMsg(type, content) {
  const div = document.createElement('div');
  div.className = `msg ${type}`;
  div.innerHTML = `<div class="bubble">${escapeHtml(content)}</div>`;
  document.getElementById('messages').appendChild(div);
  scrollBottom();
}

function addToolStatus(content) {
  // Find last tool message and mark done, or add new
  const msgs = document.getElementById('messages');
  const last = msgs.querySelector('.msg.tool:last-child .bubble:not(.done)');
  if (last) last.classList.add('done');
  const div = document.createElement('div');
  div.className = 'msg tool';
  div.innerHTML = `<div class="bubble">${escapeHtml(content)}</div>`;
  msgs.appendChild(div);
  scrollBottom();
}

function sendMessage() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text || !ws || ws.readyState !== 1) return;
  addMsg('user', text);
  ws.send(JSON.stringify({ type: 'chat', content: text }));
  input.value = '';
  input.style.height = 'auto';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  // Auto-resize
  setTimeout(() => { e.target.style.height = 'auto'; e.target.style.height = e.target.scrollHeight + 'px'; }, 0);
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function scrollBottom() {
  const m = document.getElementById('messages');
  m.scrollTop = m.scrollHeight;
}

// State cache for diffing
let _prev = {};

// Update element only if content changed
function updateEl(id, html) {
  const el = document.getElementById(id);
  if (el && el.innerHTML !== html) el.innerHTML = html;
}

// Dashboard refresh — surgical updates, no full rebuild
async function refresh() {
  try {
    const [status, workers, goals, jobs, channels] = await Promise.all([
      fetch('/api/status').then(r => r.json()),
      fetch('/api/workers').then(r => r.json()),
      fetch('/api/goals').then(r => r.json()),
      fetch('/api/jobs').then(r => r.json()),
      fetch('/api/channels').then(r => r.json()),
    ]);

    // System stats
    updateEl('sys-stats', status.system || '');

    // Quota
    const q = status.quota || {};
    const q5 = q['5h-utilization'], q7 = q['7d-utilization'];
    updateEl('quota-stats', q5 ? `Quota: <b>${(q5*100).toFixed(0)}%</b> 5h | <b>${(q7*100).toFixed(0)}%</b> 7d` : '');

    // Load models list once
    if (models.length === 0) {
      models = await fetch('/api/models').then(r => r.json());
    }

    // Pipeline summary in top bar
    const pp = status.pipeline;
    const pparts = [];
    if (pp.pre_context.enabled) pparts.push(pp.pre_context.model);
    pparts.push(`<b>${pp.main.model}</b>`);
    if (pp.post_context.enabled) pparts.push(pp.post_context.model);
    updateEl('pipeline-summary', pparts.join(' → '));

    // Pipeline — only re-render if changed
    const ppKey = JSON.stringify(pp);
    if (_prev.pipeline !== ppKey) {
      _prev.pipeline = ppKey;
      renderPipeline(pp);
    }

    // Workers — only if changed
    const wKey = JSON.stringify(workers);
    if (_prev.workers !== wKey) {
      _prev.workers = wKey;
      updateEl('workers-list', workers.length ? workers.map(w =>
        `<div class="item ${w.alive ? 'online' : 'offline'}"><b>${w.name}</b> ${w.platform} ${w.connected}</div>`
      ).join('') : '<div class="item">none connected</div>');
    }

    // Memory counters — update counts without touching the facts detail
    const mem = status.memory;
    const memKey = `${mem.volatile.count}:${mem.working.count}:${mem.concrete.count}`;
    if (_prev.memKey !== memKey) {
      _prev.memKey = memKey;
      const vc = document.getElementById('mem-v-count');
      const wc = document.getElementById('mem-w-count');
      const cc = document.getElementById('mem-c-count');
      if (vc) vc.textContent = `${mem.volatile.count} facts (${mem.volatile.tokens} tok)`;
      if (wc) wc.textContent = `${mem.working.count} facts (${mem.working.tokens} tok)`;
      if (cc) cc.textContent = `${mem.concrete.count} facts (${mem.concrete.tokens} tok)`;
    }

    // Goals — only if changed
    const gKey = JSON.stringify(goals);
    if (_prev.goals !== gKey) {
      _prev.goals = gKey;
      updateEl('goals-list', goals.length ? goals.map(g =>
        `<div class="item"><b>${g.title}</b> [${g.status}] ${g.progress} <a href="#" onclick="goalAction('${g.id}','pause');return false">⏸</a> <a href="#" onclick="goalAction('${g.id}','delete');return false">✕</a></div>`
      ).join('') : '<div class="item">none</div>');
    }

    // Jobs — only if changed
    const jKey = JSON.stringify(jobs);
    if (_prev.jobs !== jKey) {
      _prev.jobs = jKey;
      updateEl('jobs-list', jobs.length ? jobs.map(j =>
        `<div class="item"><b>${j.name}</b> ${j.cron} ${j.enabled ? '✓' : '✗'} <a href="#" onclick="deleteJob('${j.id}');return false">✕</a></div>`
      ).join('') : '<div class="item">none</div>');
    }

    // Channels — only if changed
    const cKey = JSON.stringify(channels);
    if (_prev.channels !== cKey) {
      _prev.channels = cKey;
      updateEl('channels-list', channels.map(c => {
        const age = c.last_active ? timeSince(c.last_active) : '?';
        return `<div class="item">
          <b>${c.name || c.platform_id}</b>
          <span style="color:var(--text-dim)">${c.platform}/${c.modality}</span>
          <span style="color:var(--text-dim);font-size:10px">${age}</span>
          <a href="#" onclick="deleteChannel('${c.platform}','${c.platform_id}');return false" title="Remove">✕</a>
        </div>`;
      }).join(''));
    }

  } catch (e) { console.error('Refresh failed:', e); }
}

function renderPipeline(p) {
  const c = document.getElementById('pipeline-config');
  const opts = (sel) => models.map(m => `<option value="${m.name}" ${m.name === sel ? 'selected' : ''}>${m.name}</option>`).join('');
  c.innerHTML = `
    <div class="pipeline">
      <label><input type="checkbox" ${p.pre_context.enabled ? 'checked' : ''} onchange="toggleStage('pre_context', this.checked)"> Pre</label>
      <select onchange="stageModel('pre_context', this.value)">${opts(p.pre_context.model)}</select>
    </div>
    <div class="pipeline">
      <span class="stage on">Main</span>
      <select onchange="stageModel('main', this.value)">${opts(p.main.model)}</select>
    </div>
    <div class="pipeline">
      <label><input type="checkbox" ${p.post_context.enabled ? 'checked' : ''} onchange="toggleStage('post_context', this.checked)"> Post</label>
      <select onchange="stageModel('post_context', this.value)">${opts(p.post_context.model)}</select>
    </div>
    <div class="pipeline">
      <span class="stage on">Agents</span>
      <select onchange="stageModel('agents', this.value)">${opts(p.agents ? p.agents.model : p.main.model)}</select>
    </div>
  `;
}

async function toggleStage(stage, enabled) {
  await fetch('/api/pipeline', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ stage, enabled }) });
  refresh();
}

async function stageModel(stage, model) {
  await fetch('/api/pipeline', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ stage, model }) });
  refresh();
}

function timeSince(ts) {
  const s = Math.floor(Date.now()/1000 - ts);
  if (s < 60) return s + 's ago';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}

async function deleteChannel(platform, platformId) {
  await fetch(`/api/channels/${platform}/${platformId}`, { method: 'DELETE' });
  refresh();
}

// Fact management
async function showFacts(tier, noToggle) {
  const det = document.getElementById('facts-detail');
  const memEl = document.getElementById('memory-stats');
  // Toggle off if clicking same tier (unless re-expanding after refresh)
  if (!noToggle && det.dataset.tier === tier) {
    det.innerHTML = ''; det.dataset.tier = ''; memEl.dataset.expanded = '';
    return;
  }
  const facts = await fetch(`/api/facts?tier=${tier}`).then(r => r.json());
  det.dataset.tier = tier;
  memEl.dataset.expanded = tier;
  det.innerHTML = facts.map(f => `
    <div class="item" style="font-size:11px;padding:3px 0;border-bottom:1px solid var(--border)">
      <span style="color:var(--text-dim)">[${f.id}]</span>
      <span class="fact-text" id="ft-${f.id}" onclick="editFact('${f.id}',this)" style="cursor:text">${escapeHtml(f.fact.substring(0,120))}</span>
      <br>
      <a href="#" onclick="promoteFact('${f.id}');return false" title="Promote">↑</a>
      <a href="#" onclick="demoteFact('${f.id}');return false" title="Demote">↓</a>
      <a href="#" onclick="deleteFact('${f.id}');return false" title="Delete">✕</a>
      <span style="color:var(--text-dim)">${f.category} ×${f.access_count}</span>
    </div>
  `).join('');
}

function editFact(id, el) {
  const current = el.textContent;
  const input = document.createElement('input');
  input.type = 'text';
  input.value = current;
  input.style.cssText = 'width:100%;background:var(--bg);color:var(--text);border:1px solid var(--accent);padding:2px 4px;font-family:var(--font);font-size:11px;border-radius:3px;';
  input.onblur = () => saveFact(id, input.value, el, current);
  input.onkeydown = (e) => { if (e.key === 'Enter') input.blur(); if (e.key === 'Escape') { el.textContent = current; } };
  el.textContent = '';
  el.appendChild(input);
  input.focus();
}

async function saveFact(id, newText, el, oldText) {
  if (newText === oldText || !newText.trim()) { el.textContent = oldText; return; }
  await fetch(`/api/facts/${id}`, {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ fact: newText.trim() }),
  });
  el.textContent = newText.trim();
}

async function promoteFact(id) {
  await fetch(`/api/facts/${id}/promote`, { method: 'POST' });
  const tier = document.getElementById('facts-detail').dataset.tier;
  if (tier) showFacts(tier);
  refresh();
}

async function demoteFact(id) {
  await fetch(`/api/facts/${id}/demote`, { method: 'POST' });
  const tier = document.getElementById('facts-detail').dataset.tier;
  if (tier) showFacts(tier);
  refresh();
}

async function deleteFact(id) {
  await fetch(`/api/facts/${id}`, { method: 'DELETE' });
  const tier = document.getElementById('facts-detail').dataset.tier;
  if (tier) showFacts(tier);
  refresh();
}

async function goalAction(id, action) {
  if (action === 'delete') await fetch(`/api/goals/${id}`, { method: 'DELETE' });
  else if (action === 'pause') await fetch(`/api/goals/${id}/pause`, { method: 'POST' });
  refresh();
}

async function deleteJob(id) {
  await fetch(`/api/jobs/${id}`, { method: 'DELETE' });
  refresh();
}

// Init
connectWS();
refresh();
setInterval(refresh, 5000);
document.getElementById('input').focus();
</script>
</body>
</html>
